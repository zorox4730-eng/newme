name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.11.4'
        channel: 'stable'
        
    - name: Install dependencies
      run: |
        flutter pub get
        # عرض أي خطأ بوضوح إذا حدث
        flutter pub upgrade --major-versions --dry-run || true

    - name: Build APK
      run: flutter build apk --release --no-pub

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: build/app/outputs/flutter-apk/app-release.apk
